<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意見交換アプリ - 管理画面</title>
<style>
  :root {
    --bg: #f7f5f2;
    --ink: #2b2a28;
    --accent: #b5573e;
    --accent-soft: #f1ddd5;
    --line: #ddd6cd;
    --card-bg: #ffffff;
    --muted: #79746c;
    --ok: #4a7a4a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 20px 80px; }
  header { padding: 28px 0 18px; border-bottom: 2px solid var(--ink); margin-bottom: 24px; }
  header h1 { font-size: 1.4rem; margin: 0 0 4px; }
  header p { margin: 0; color: var(--muted); font-size: 0.85rem; }
  .card { background: var(--card-bg); border: 1px solid var(--line); border-radius: 10px; padding: 22px; margin-bottom: 18px; }
  .card h2 { font-size: 1.05rem; margin: 0 0 14px; display:flex; align-items:center; gap:8px; }
  label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
  input[type="text"], textarea, select {
    width: 100%; font-size: 1rem; padding: 11px 12px; border: 1px solid var(--line);
    border-radius: 7px; background: #fdfcfb; font-family: inherit; color: var(--ink);
  }
  textarea { resize: vertical; min-height: 70px; }
  .field-row { margin-bottom: 14px; }
  button {
    background: var(--ink); color: #fff; border: none; border-radius: 7px;
    padding: 11px 20px; font-size: 0.92rem; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  button:hover { background: var(--accent); }
  button:disabled { background: #c9c4bc; cursor: not-allowed; }
  button.danger { background: #8a3b2a; }
  button.danger:hover { background: #b5573e; }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.88rem; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 0.78rem; }
  .stat { display:flex; gap:20px; flex-wrap:wrap; margin-top:8px; }
  .stat-box { background: var(--accent-soft); border-radius: 8px; padding: 12px 18px; min-width:120px; }
  .stat-box .num { font-size:1.6rem; font-weight:700; color: var(--accent); }
  .stat-box .label { font-size:0.75rem; color: var(--muted); }
  .badge-status { display:inline-block; font-size:0.72rem; font-weight:700; padding:2px 9px; border-radius:999px; }
  .badge-open { background:#e3eede; color:#4a7a4a; }
  .badge-distributed { background:#dde6ee; color:#3a6a9a; }
  .badge-closed { background:#e8e6e2; color:#79746c; }
  .theme-item { padding:10px 0; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .small-note { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
  #log { font-size: 0.82rem; color: var(--muted); margin-top: 10px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>意見交換アプリ - 管理画面</h1>
    <p>テーマの作成・配信の実行・提出状況の確認</p>
  </header>

  <div class="card">
    <h2>① 新しいテーマを作成</h2>
    <div class="field-row">
      <label for="new-theme-title">テーマ文（学生に表示される問い）</label>
      <textarea id="new-theme-title" placeholder="例：地域包括ケアにおける住民参加について、あなたの考えを述べてください"></textarea>
    </div>
    <div class="field-row">
      <label for="assign-count">1人あたり配信する意見の件数</label>
      <select id="assign-count">
        <option value="2">2件</option>
        <option value="3" selected>3件</option>
      </select>
    </div>
    <button id="create-theme-btn">テーマを作成して開始（意見募集を開始）</button>
  </div>

  <div class="card">
    <h2>② 現在進行中のテーマ</h2>
    <div id="current-theme-box">読み込み中…</div>
  </div>

  <div class="card">
    <h2>③ テーマ一覧</h2>
    <div id="theme-list">読み込み中…</div>
  </div>

  <p id="log"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ===== Firebaseプロジェクトの設定値 ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBWIsFaEkcM-mrfpuMirs2klEr-1S4QEcM",
  authDomain: "opinion-exchange-app-54232.firebaseapp.com",
  databaseURL: "https://opinion-exchange-app-54232-default-rtdb.firebaseio.com",
  projectId: "opinion-exchange-app-54232",
};
/* ======================================== */

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function log(msg) {
  document.getElementById('log').textContent = msg;
}

function genThemeId() {
  return 'theme_' + Date.now();
}

document.getElementById('create-theme-btn').addEventListener('click', () => {
  const title = document.getElementById('new-theme-title').value.trim();
  if (!title) { alert('テーマ文を入力してください'); return; }
  const assignCount = parseInt(document.getElementById('assign-count').value, 10);

  const themeId = genThemeId();
  const theme = {
    title,
    assignCount,
    status: 'open',
    createdAt: firebase.database.ServerValue.TIMESTAMP
  };

  db.ref('themes/list/' + themeId).set(theme)
    .then(() => db.ref('themes/current').set(themeId))
    .then(() => {
      document.getElementById('new-theme-title').value = '';
      log('テーマを作成し、意見募集を開始しました。');
      loadThemeList();
      loadCurrentTheme();
    })
    .catch(err => alert('作成に失敗しました：' + err.message));
});

function loadCurrentTheme() {
  db.ref('themes/current').once('value').then(snap => {
    const themeId = snap.val();
    const box = document.getElementById('current-theme-box');
    if (!themeId) {
      box.innerHTML = '<p class="small-note">現在進行中のテーマはありません。</p>';
      return;
    }
    db.ref('themes/list/' + themeId).once('value').then(themeSnap => {
      const theme = themeSnap.val();
      renderCurrentThemeBox(themeId, theme);
    });
  });
}

function statusBadge(status) {
  if (status === 'open') return '<span class="badge-status badge-open">意見募集中</span>';
  if (status === 'distributed') return '<span class="badge-status badge-distributed">配信済み・コメント受付中</span>';
  return '<span class="badge-status badge-closed">終了</span>';
}

function renderCurrentThemeBox(themeId, theme) {
  const box = document.getElementById('current-theme-box');
  if (!theme) { box.innerHTML = '<p class="small-note">テーマが見つかりません。</p>'; return; }

  Promise.all([
    db.ref('opinions/' + themeId).once('value'),
    db.ref('comments/' + themeId).once('value')
  ]).then(([oppSnap, cmtSnap]) => {
    const opinions = oppSnap.val() || {};
    const oppCount = Object.keys(opinions).length;

    const comments = cmtSnap.val() || {};
    let commentTotal = 0;
    Object.values(comments).forEach(perStudent => {
      commentTotal += Object.keys(perStudent).length;
    });
    const expectedComments = theme.status === 'distributed' || theme.status === 'closed'
      ? oppCount * theme.assignCount : null;

    box.innerHTML = `
      <p><strong>${escapeHtml(theme.title)}</strong> ${statusBadge(theme.status)}</p>
      <div class="stat">
        <div class="stat-box"><div class="num">${oppCount}</div><div class="label">意見の提出数</div></div>
        <div class="stat-box"><div class="num">${commentTotal}${expectedComments !== null ? ' / ' + expectedComments : ''}</div><div class="label">コメント提出数</div></div>
      </div>
      <div class="row" style="margin-top:16px;">
        ${theme.status === 'open' ? `<button id="distribute-btn">配信を実行する（${oppCount}件の意見を1人${theme.assignCount}件ずつ配信）</button>` : ''}
        ${theme.status === 'distributed' ? `<button id="close-btn" class="danger">このテーマを終了する</button>` : ''}
        ${oppCount > 0 ? `<button id="export-current-btn" class="secondary">CSVをダウンロード</button>` : ''}
      </div>
      <p class="small-note" id="distribute-note"></p>
    `;

    if (theme.status === 'open') {
      document.getElementById('distribute-btn').addEventListener('click', () => {
        runDistribution(themeId, theme, opinions);
      });
    }
    if (theme.status === 'distributed') {
      document.getElementById('close-btn').addEventListener('click', () => {
        db.ref('themes/list/' + themeId + '/status').set('closed').then(() => {
          log('テーマを終了しました。');
          loadCurrentTheme(); loadThemeList();
        });
      });
    }
    if (oppCount > 0) {
      document.getElementById('export-current-btn').addEventListener('click', () => {
        exportThemeCSV(themeId, theme);
      });
    }
  });
}

// ===== 配信ロジック（円環オフセット方式） =====
// シャッフルした提出者リストに対し、各人へ「自分以外」のN人をずらして割り当てる。
// 全員の意見がちょうどN回ずつ読まれ、自分の意見が自分には配信されない。
function runDistribution(themeId, theme, opinions) {
  const keys = Object.keys(opinions);
  const n = keys.length;
  const assignCount = theme.assignCount;

  if (n < assignCount + 1) {
    alert(`配信には最低 ${assignCount + 1} 人分の意見が必要です（現在 ${n} 件）。`);
    return;
  }

  // シャッフル
  const shuffled = [...keys];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  const updates = {};
  for (let i = 0; i < n; i++) {
    const targets = [];
    for (let offset = 1; offset <= assignCount; offset++) {
      targets.push(shuffled[(i + offset) % n]);
    }
    const studentKey = shuffled[i];
    updates[`assignments/${themeId}/${studentKey}`] = { targets };
  }
  updates[`themes/list/${themeId}/status`] = 'distributed';
  updates[`themes/list/${themeId}/distributedAt`] = firebase.database.ServerValue.TIMESTAMP;

  document.getElementById('distribute-note').textContent = '配信を実行中…';
  db.ref().update(updates).then(() => {
    log(`配信を実行しました（${n}人 × ${assignCount}件）。`);
    loadCurrentTheme();
    loadThemeList();
  }).catch(err => alert('配信に失敗しました：' + err.message));
}

function loadThemeList() {
  db.ref('themes/list').once('value').then(snap => {
    const all = snap.val() || {};
    const list = document.getElementById('theme-list');
    const ids = Object.keys(all).sort((a, b) => (all[b].createdAt || 0) - (all[a].createdAt || 0));
    if (ids.length === 0) {
      list.innerHTML = '<p class="small-note">まだテーマがありません。</p>';
      return;
    }
    list.innerHTML = ids.map(id => {
      const t = all[id];
      return `<div class="theme-item">
        <span>${escapeHtml(t.title)}</span>
        <span style="display:flex; align-items:center; gap:10px;">
          ${statusBadge(t.status)}
          <button class="secondary export-btn" data-theme-id="${id}" style="padding:6px 12px; font-size:0.78rem;">CSV</button>
          <button class="danger delete-btn" data-theme-id="${id}" style="padding:6px 12px; font-size:0.78rem;">削除</button>
        </span>
      </div>`;
    }).join('');

    list.querySelectorAll('.export-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-theme-id');
        exportThemeCSV(id, all[id]);
      });
    });
    list.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-theme-id');
        deleteTheme(id, all[id]);
      });
    });
  });
}

// ===== テーマ削除 =====
function deleteTheme(themeId, theme) {
  const title = theme ? theme.title : themeId;
  if (!confirm(`「${title}」を削除します。意見・コメントのデータもすべて削除され、元に戻せません。本当に削除しますか？`)) {
    return;
  }
  const updates = {};
  updates[`themes/list/${themeId}`] = null;
  updates[`opinions/${themeId}`] = null;
  updates[`assignments/${themeId}`] = null;
  updates[`comments/${themeId}`] = null;

  db.ref().update(updates).then(() => {
    return db.ref('themes/current').once('value');
  }).then(snap => {
    if (snap.val() === themeId) {
      return db.ref('themes/current').set(null);
    }
  }).then(() => {
    log('テーマを削除しました。');
    loadCurrentTheme();
    loadThemeList();
  }).catch(err => alert('削除に失敗しました：' + err.message));
}

// ===== CSVエクスポート =====
function exportThemeCSV(themeId, theme) {
  Promise.all([
    db.ref('opinions/' + themeId).once('value'),
    db.ref('comments/' + themeId).once('value')
  ]).then(([oppSnap, cmtSnap]) => {
    const opinions = oppSnap.val() || {};
    const comments = cmtSnap.val() || {};

    // 意見一覧CSV
    const opinionRows = Object.keys(opinions).map(key => {
      const o = opinions[key];
      return [o.studentId || key, o.name || '', o.text || '', formatTs(o.submittedAt)];
    });
    downloadCSV(
      sanitizeFilename(theme.title) + '_意見一覧.csv',
      toCSV(['学籍番号', '氏名', '意見内容', '提出日時'], opinionRows)
    );

    // コメント一覧CSV（対象意見の提出者情報も付与）
    const commentRows = [];
    Object.keys(comments).forEach(commenterKey => {
      const perTarget = comments[commenterKey] || {};
      Object.keys(perTarget).forEach(targetKey => {
        const c = perTarget[targetKey];
        const targetOpinion = opinions[targetKey] || {};
        commentRows.push([
          c.commenterStudentId || commenterKey,
          c.commenterName || '',
          targetOpinion.studentId || targetKey,
          targetOpinion.name || '',
          c.commentText || '',
          formatTs(c.submittedAt)
        ]);
      });
    });
    // 少し時間をずらして2つ目のダウンロードを発火（ブラウザのポップアップブロック対策）
    setTimeout(() => {
      downloadCSV(
        sanitizeFilename(theme.title) + '_コメント一覧.csv',
        toCSV(['コメント記載者学籍番号', 'コメント記載者氏名', '対象学籍番号', '対象氏名', 'コメント内容', '提出日時'], commentRows)
      );
    }, 300);

    log('CSVをダウンロードしました。');
  }).catch(err => alert('CSV出力に失敗しました：' + err.message));
}

function formatTs(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function sanitizeFilename(name) {
  return (name || 'theme').replace(/[\\/:*?"<>|]/g, '_').slice(0, 40);
}

function csvEscape(val) {
  const s = String(val ?? '');
  if (/[",\n]/.test(s)) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function toCSV(headers, rows) {
  const lines = [headers.map(csvEscape).join(',')];
  rows.forEach(row => lines.push(row.map(csvEscape).join(',')));
  return lines.join('\r\n');
}

function downloadCSV(filename, content) {
  // ExcelでもExcelで文字化けしないようUTF-8 BOM付きで出力
  const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadCurrentTheme();
loadThemeList();
</script>
</body>
</html>
